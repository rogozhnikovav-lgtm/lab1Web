
<html>
    <head>
        <link rel="icon" href="favic.png" sizes="32x32" type="image/png">      
        <title>
            Список дел
        </title>
        
    </head>
    <BODY>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

/* Сброс отступов и базовые стили */
* 

body {
    font-family: 'Roboto', Arial, sans-serif;
    background: rgba(1, 44, 24, 0.616);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 20px;
}

/* Основной контейнер-карточка */
.container {
    width: 100%;
    max-width: 800px;
    background: rgb(3, 68, 19);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    padding: 30px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
}

/* Заголовок */
h1 {
    color: #333;
    margin-bottom: 25px;
    text-align: center;
    font-weight: 700;
    font-size: 2.2em;
    background: rgb(255, 255, 255);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Панель ввода и кнопок */
.input-panel {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.input-panel input {
    flex: 1 1 250px;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    font-size: 16px;
    font-family: 'Roboto', sans-serif;
    transition: border-color 0.3s;
}

.input-panel input:focus {
    outline: none;
    border-color: #023f26;
}

/* Кнопки */
button {
    padding: 12px 20px;
    border: none;

    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Roboto', sans-serif;
    background: #667eea;
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
}

button:hover {
    background: #764ba2;
    
}

/* Кнопка очистки (особый стиль) */
button:last-of-type {
    background: #ff6b6b;
}

button:last-of-type:hover {
    background: #f01616;
}

/* Контейнер списка с прокруткой */
.todo-list-container {
    flex: 1;
    overflow-y: auto;
    max-height: 400px;
    margin-bottom: 20px;
}

/* Стили для списка */
ol {
    list-style: none;
    counter-reset: todo-counter;
}

li {
    counter-increment: todo-counter;
    padding: 15px;
    margin-bottom: 8px;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    border-left: 4px solid transparent;
}



/* Стили для чекбоксов */
input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
    transition: transform 0.2s;
}



/* Иконка-кнопка в списке */
li button {
    padding: 5px 10px;
    margin-left: auto;
    background: #ddd;
    color: #3d3c3c;
    font-size: 16px;
}



/* Дата в элементе списка */
.todo-date {
    color: #666;
    font-size: 12px;
    background: rgba(102, 126, 234, 0.1);
    padding: 3px 8px;
    white-space: nowrap;
}

/* Сообщение о пустом списке (по умолчанию скрыто) */
.empty-message {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: #666;
    font-size: 18px;
    font-weight: 500;
}

/* Показываем сообщение, если список пуст */
ol:empty + .empty-message {
    display: block;
}



footer {
    text-align: center;
    color: #999;
    font-size: 14px;
    margin-top: auto;
}


/* Стили для скроллбара */
.todo-list-container::-webkit-scrollbar {
    width: 8px;
}

.todo-list-container::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 10px;
}


        </style>
        <div class="container">
        <h1>Список дел</h1>
        
        <div class="input-panel">
            <input type="text" id="newTodo" placeholder="Новый элемент списка" />
            <button class="add-btn">➕ Создать</button>
            <button class="clear-btn">🗑️ Очистить всё</button>
        </div>

        <div class="todo-list-container">
            <ol>
                <li>
                    <input type="checkbox" checked />
                    <span>Почесать кошку</span>
                    <sup class="todo-date">2023-08-24</sup>
                    <button>✖</button>
                </li>
                <li>
                    <input type="checkbox" checked />
                    <span>Полить картошку</span>
                    <sup class="todo-date">2022-05-04</sup>
                    <button>✖</button>
                </li>
                <li>
                    <input type="checkbox" checked />
                    <span>Сложить в лукошко</span>
                    <sup class="todo-date">2022-05-14</sup>
                    <button>✖</button>
                </li>
                
            </ol>
            <div class="empty-message"> Не найдено ни одного дела</div>
        </div>

        <footer class="page-footer">
            <hr class="footer-line">
            <div class="footer-content">
                Copyright © 2024
            </div>
        </footer>
    </div>
    </BODY>
</html>
